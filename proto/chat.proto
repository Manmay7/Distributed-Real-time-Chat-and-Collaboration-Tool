syntax = "proto3";

package chat;

service ChatService {
  rpc Login(LoginRequest) returns (LoginResponse);
  rpc Logout(LogoutRequest) returns (LogoutResponse);
  rpc PostMessage(PostRequest) returns (PostResponse);
  rpc GetMessages(GetRequest) returns (GetResponse);
}

message LoginRequest {
  string username = 1;
  string password = 2;
}

message LoginResponse {
  bool success = 1;
  string token = 2;
}

message LogoutRequest {
  string token = 1;
}

message LogoutResponse {
  bool success = 1;
}

message PostRequest {
  string token = 1;
  string message = 2;
}

message PostResponse {
  bool success = 1;
}

message GetRequest {
  string token = 1;
}

message GetResponse {
  repeated string messages = 1;
}
